---
# yaml-language-server: $schema=https://schemas.zinn.ca/renovate-operator.mogenius.com/renovatejob_v1alpha1.json
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: k8s-homelab
spec:
  discoveryFilters:
    - szinn/k8s-homelab
  extraEnv:
    - name: LOG_LEVEL
      value: debug
    - name: RENOVATE_ALLOWED_COMMANDS
      value: |-
        [pnpm ["pnpm run bundle"]
    - name: RENOVATE_GIT_AUTHOR
      value: "Jeeves <jeeves@noreply.github.com>"
    - name: RENOVATE_PLATFORM_COMMIT
      value: enabled
  image: ghcr.io/renovatebot/renovate:43.169.1@sha256:89a84da9df322037b7a3d9f44681af8ba04dbe3d063ea96cb5f0fe4ac7a33b93
  parallelism: 5
  provider:
    name: github
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  schedule: 0 * * * *
  secretRef: renovate-secret
  webhook:
    enabled: true
