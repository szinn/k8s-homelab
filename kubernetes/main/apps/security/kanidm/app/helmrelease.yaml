---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kanidm
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  values:
    controllers:
      kanidm:
        replicas: 1
        pod:
          annotations:
            reloader.stakater.com/auto: "true"
          securityContext:
            fsGroup: 2000
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 2000
            runAsNonRoot: true
            runAsUser: 2000
        containers:
          app:
            image:
              repository: docker.io/kanidm/server
              tag: 1.9.3@sha256:1ecb3c61647e8d456592e0d5ca0a1e76a9ae473838db3c70f7b762f03fdd6a08
            env:
              KANIDM_ADMIN_BIND_PATH: /var/run/kanidmd.sock
              KANIDM_DOMAIN: auth.zinn.ca
              KANIDM_ORIGIN: https://auth.zinn.ca
              KANIDM_BINDADDRESS: "[::]:8443"
              KANIDM_LDAPBINDADDRESS: "[::]:3636"
              KANIDM_DB_PATH: /data/kanidm.db
              KANIDM_TLS_CHAIN: /certs/tls.crt
              KANIDM_TLS_KEY: /certs/tls.key
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    persistence:
      data:
        existingClaim: "${VOLSYNC_CLAIM}"
        globalMounts:
          - path: /data
            subPath: data
      certs:
        type: secret
        name: kanidm-tls
        defaultMode: 0400
        globalMounts:
          - path: /certs
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /var/run
            subPath: var-run
    route:
      app:
        hostnames:
          - auth.zinn.ca
        parentRefs:
          - name: envoy-internal
            namespace: network
    service:
      app:
        ports:
          http:
            port: 8443
          ldap:
            port: 3636
