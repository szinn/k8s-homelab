---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kanidm
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      kanidm:
        replicas: 1
        type: statefulset
        pod:
          annotations:
            reloader.stakater.com/auto: "true"
          securityContext:
            runAsUser: 2000
            runAsGroup: 2000
            runAsNonRoot: true
            fsGroup: 2000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: docker.io/kanidm/server
              tag: "1.9.2@sha256:b2600b42dd4a91bcea66eb067b74a180b9ffaff322c3785ea0b411d12c51c7b2"
            env:
              KANIDM_ADMIN_BIND_PATH: /var/run/kanidmd.sock
              KANIDM_DOMAIN: auth.zinn.ca
              KANIDM_ORIGIN: https://auth.zinn.ca
              KANIDM_BINDADDRESS: "[::]:8080"
              KANIDM_LDAPBINDADDRESS: "[::]:3636"
              KANIDM_DB_PATH: /data/kanidm.db
              KANIDM_TLS_CHAIN: /certs/tls.crt
              KANIDM_TLS_KEY: /certs/tls.key
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.11.1.9
        ports:
          http:
            port: 8080
          ldap:
            port: 3636

    route:
      internal:
        hostnames:
          - auth.zinn.ca
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
      # external:
      #   annotations:
      #     external-dns/is-public: "true"
      #     external-dns.alpha.kubernetes.io/target: external.zinn.ca
      #   hostnames:
      #     - auth.zinn.ca
      #   parentRefs:
      #     - name: envoy-external
      #       namespace: network
      #       sectionName: https

    persistence:
      data:
        existingClaim: "${VOLSYNC_CLAIM}"
        globalMounts:
          - path: /data
      certs:
        type: secret
        name: kanidm-tls
        defaultMode: 0400
        globalMounts:
          - path: /certs
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /var/run
