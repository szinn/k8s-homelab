---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kanidm
spec:
  targetNamespace: security
  path: ./kubernetes/main/apps/security/kanidm/app
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  components:
    - ../../../../components/volsync
  postBuild:
    substitute:
      APP: kanidm
      VOLSYNC_CLAIM: kanidm
      VOLSYNC_CAPACITY: 5Gi
  prune: true
  wait: false
  interval: 30m
  timeout: 5m
