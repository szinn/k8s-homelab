---
# yaml-language-server: $schema=https://schemas.zinn.ca/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: home-assistant
spec:
  targetNamespace: home
  path: ./kubernetes/main/apps/home/home-assistant/app
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: external-secrets
      namespace: external-secrets
    - name: volsync
      namespace: system
  components:
    - ../../../../components/volsync
  postBuild:
    substitute:
      APP: home-assistant
      VOLSYNC_CLAIM: home-assistant-config
      VOLSYNC_CAPACITY: 8Gi
  prune: true
  wait: false
  interval: 30m
  timeout: 5m
