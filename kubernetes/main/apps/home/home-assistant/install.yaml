---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: home-assistant
spec:
  targetNamespace: home
  path: ./kubernetes/main/apps/home/home-assistant/app
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: external-secrets
      namespace: external-secrets
    - name: volsync
      namespace: system
    - name: kopiur
      namespace: system
  components:
    # - ../../../../components/volsync
    - ../../../../components/kopiur/kopiur
    - ../../../../components/kopiur/pvc
  postBuild:
    substitute:
      APP: home-assistant
      VOLSYNC_CLAIM: home-assistant-config
      VOLSYNC_CAPACITY: 8Gi
      KOPIUR_CLAIM: home-assistant-config
      KOPIUR_CAPACITY: 8Gi
      KOPIUR_PUID: "65534"
      KOPIUR_PGID: "65533"
  prune: true
  wait: false
  interval: 30m
  timeout: 5m
