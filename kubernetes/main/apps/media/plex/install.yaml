---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: plex
spec:
  targetNamespace: media
  path: ./kubernetes/main/apps/media/plex/app
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: external-secrets
      namespace: external-secrets
    - name: kopiur
      namespace: system
  components:
    - ../../../../components/kopiur/kopiur
    - ../../../../components/kopiur/pvc
    - ../../../../components/zeroscaler
  postBuild:
    substitute:
      APP: plex
      KOPIUR_CLAIM: plex-config
      KOPIUR_CAPACITY: 50Gi
  prune: true
  wait: false
  interval: 30m
  timeout: 5m
