---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bookboss
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    defaultPodOptions:
      dnsConfig:
        options:
          - name: ndots
            value: "1"
    controllers:
      bookboss:
        strategy: Recreate
        annotations:
          secret.reloader.stakater.com/reload: bookboss-secret
        pod:
          enableServiceLinks: false
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7
              pullPolicy: IfNotPresent
            envFrom:
              - secretRef:
                  name: bookboss-secret
        containers:
          bookboss:
            image:
              repository: ghcr.io/szinn/bookboss
              tag: v0.8.30@sha256:073a9e71fb731e624fe5d8f415df457685b5b3c66a613f610c3188a6c689a3db
            env:
              BOOKBOSS__FRONTEND__BASE_URL: "https://bookboss.zinn.ca"
              BOOKBOSS__LIBRARY__LIBRARY_PATH: "/library/books"
              BOOKBOSS__IMPORT__BOOKDROP_PATH: "/library/bookdrop"
              BOOKBOSS__IMPORT__POLL_INTERVAL_SECS: 60
              BOOKBOSS__IMPORT__WORKER_POLL_INTERVAL_SECS: 5
              TZ: "America/Toronto"
              RUST_LOG: "DEBUG"
            envFrom:
              - secretRef:
                  name: bookboss-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: &port 8080
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /readyz
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
    service:
      bookboss:
        ports:
          http:
            port: *port
            primary: true
          grpc:
            port: 8081
            targetPort: 8081
            appProtocol: grpc

    route:
      internal:
        annotations:
          gatus.home-operations.com/endpoint: |
            url: "https://{{ .Release.Name }}.zinn.ca/healthz"
            conditions: ["[STATUS] == 200"]
        hostnames:
          - "{{ .Release.Name }}.zinn.ca"
        parentRefs:
          - name: envoy-internal
            namespace: network

    persistence:
      library:
        type: nfs
        server: ragnar.zinn.tech
        path: /mnt/atlas/media
        advancedMounts:
          bookboss:
            bookboss:
              - path: /library/books
                subPath: BookLibrary/Books
              - path: /library/bookdrop
                subPath: BookLibrary/Bookdrop
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
