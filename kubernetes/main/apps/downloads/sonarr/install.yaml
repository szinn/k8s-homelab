---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sonarr
spec:
  targetNamespace: downloads
  path: ./kubernetes/main/apps/downloads/sonarr/app
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: external-secrets
      namespace: external-secrets
    - name: volsync
      namespace: system
    - name: kopiur
      namespace: system
  components:
    # - ../../../../components/volsync
    - ../../../../components/zeroscaler
    - ../../../../components/kopiur/kopiur
    - ../../../../components/kopiur/pvc
  postBuild:
    substitute:
      APP: sonarr
      VOLSYNC_CLAIM: sonarr-config
      VOLSYNC_CAPACITY: 15Gi
      KOPIUR_CLAIM: sonarr-config
      KOPIUR_CAPACITY: 15Gi
  prune: true
  wait: false
  interval: 30m
  timeout: 5m
