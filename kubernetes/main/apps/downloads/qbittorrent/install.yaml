---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: qbittorrent
spec:
  targetNamespace: downloads
  path: ./kubernetes/main/apps/downloads/qbittorrent/app
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: external-secrets
      namespace: external-secrets
    # - name: volsync
    #   namespace: system
    - name: kopiur
      namespace: system
  components:
    - ../../../../components/kopiur/kopiur
    - ../../../../components/kopiur/pvc
    # - ../../../../components/volsync
    - ../../../../components/zeroscaler
  postBuild:
    substitute:
      APP: qbittorrent
      # VOLSYNC_CLAIM: qbittorrent-config
      # VOLSYNC_CAPACITY: 2Gi
      KOPIUR_CLAIM: qbittorrent-config
      KOPIUR_CAPACITY: 2Gi
  prune: true
  wait: false
  interval: 30m
  timeout: 5m
