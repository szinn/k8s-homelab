---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: wikijs
spec:
  targetNamespace: self-hosted
  path: ./kubernetes/main/apps/self-hosted/wikijs/app
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: external-secrets
      namespace: external-secrets
    # - name: volsync
    #   namespace: system
    - name: kopiur
      namespace: system
  components:
    # - ../../../../components/volsync
    - ../../../../components/kopiur/kopiur
    - ../../../../components/kopiur/pvc
  postBuild:
    substitute:
      APP: wikijs
      # VOLSYNC_PUID: "1000"
      # VOLSYNC_PGID: "1000"
      # VOLSYNC_CLAIM: wikijs-data
      # VOLSYNC_CAPACITY: 15Gi
      KOPIUR_CLAIM: wikijs-data
      KOPIUR_CAPACITY: 15Gi
      KOPIUR_PUID: "1000"
      KOPIUR_PGID: "1000"
  prune: true
  wait: false
  interval: 30m
  timeout: 5m
