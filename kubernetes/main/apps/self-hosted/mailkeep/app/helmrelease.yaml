---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mailkeep
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    defaultPodOptions:
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      securityContext:
        runAsUser: 1234
        runAsGroup: 1234
        runAsNonRoot: true
        fsGroup: 1234
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      mailkeep:
        strategy: Recreate
        annotations:
          secret.reloader.stakater.com/reload: mailkeep-secret
        pod:
          enableServiceLinks: false
        containers:
          mailkeep:
            image:
              repository: ghcr.io/szinn/mailkeep
              tag: v0.1.9@sha256:ab8edfb9c0b0fbef82e9e58bd758a1c352dc95cb591d5bd5d358114f48232d5c
            env:
              MAILKEEP__METADATA_PATH: /data
              MAILKEEP__STORAGE_PATH: /storage
              MAILKEEP__FRONTEND__BASE_URL: "https://mailkeep.zinn.ca"
              TZ: "America/Toronto"
              RUST_LOG: "DEBUG"
            envFrom:
              - secretRef:
                  name: mailkeep-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: &port 8080
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /readyz
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
    service:
      mailkeep:
        ports:
          http:
            port: *port
    route:
      internal:
        annotations:
          gatus.home-operations.com/endpoint: |
            url: "https://{{ .Release.Name }}.zinn.ca/healthz"
            conditions: ["[STATUS] == 200"]
        hostnames:
          - "{{ .Release.Name }}.zinn.ca"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      data:
        existingClaim: mailkeep-config
      storage:
        type: nfs
        server: ragnar.zinn.tech
        path: /mnt/atlas/backup
        globalMounts:
          - path: /storage
            subPath: MailKeep
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
