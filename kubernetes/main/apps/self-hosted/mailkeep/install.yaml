---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: mailkeep
spec:
  targetNamespace: self-hosted
  path: ./kubernetes/main/apps/self-hosted/mailkeep/app
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: kopiur
      namespace: system
    - name: external-secrets
      namespace: external-secrets
  components:
    - ../../../../components/kopiur/kopiur
    - ../../../../components/kopiur/pvc
    - ../../../../components/zeroscaler
  postBuild:
    substitute:
      APP: mailkeep
      KOPIUR_CLAIM: mailkeep-config
      KOPIUR_CAPACITY: 50Gi
  prune: true
  wait: false
  interval: 30m
  timeout: 5m
