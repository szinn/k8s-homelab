---
# yaml-language-server: $schema=https://schemas.zinn.ca/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: freshrss
spec:
  targetNamespace: self-hosted
  path: ./kubernetes/main/apps/self-hosted/freshrss/app
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  components:
    - ../../../../components/volsync
  postBuild:
    substitute:
      APP: freshrss
      APP_UID: "0"
      APP_GID: "82"
      VOLSYNC_CLAIM: freshrss-config
      VOLSYNC_CAPACITY: 2Gi
  prune: true
  wait: false
  interval: 30m
  timeout: 5m
