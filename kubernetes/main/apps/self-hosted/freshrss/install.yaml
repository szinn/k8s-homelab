---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: freshrss
spec:
  targetNamespace: self-hosted
  path: ./kubernetes/main/apps/self-hosted/freshrss/app
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: kopiur
      namespace: system
  components:
    - ../../../../components/kopiur/kopiur
    - ../../../../components/kopiur/pvc
  postBuild:
    substitute:
      APP: freshrss
      APP_UID: "0"
      APP_GID: "82"
      KOPIUR_CLAIM: freshrss-config
      KOPIUR_CAPACITY: 2Gi
      KOPIUR_PUID: "0"
      KOPIUR_PGID: "82"
      KOPIUR_RUNASNONROOT: "false"
  prune: true
  wait: false
  interval: 30m
  timeout: 5m
