---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: atuin
spec:
  targetNamespace: self-hosted
  path: ./kubernetes/main/apps/self-hosted/atuin/app
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    # - name: volsync
    #   namespace: system
    - name: kopiur
      namespace: system
  components:
    # - ../../../../components/volsync
    - ../../../../components/kopiur/kopiur
    - ../../../../components/kopiur/pvc
  postBuild:
    substitute:
      APP: atuin
      # VOLSYNC_CLAIM: atuin-config
      # VOLSYNC_CAPACITY: 5Gi
      KOPIUR_CLAIM: atuin-config
      KOPIUR_CAPACITY: 5Gi
  prune: true
  wait: false
  interval: 30m
  timeout: 5m
