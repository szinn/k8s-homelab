---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: changedetection
spec:
  targetNamespace: self-hosted
  path: ./kubernetes/main/apps/self-hosted/changedetection/app
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: external-secrets
      namespace: external-secrets
    # - name: volsync
    #   namespace: system
    - name: kopiur
      namespace: system
  components:
    # - ../../../../components/volsync
    - ../../../../components/kopiur/kopiur
    - ../../../../components/kopiur/pvc
  postBuild:
    substitute:
      APP: changedetection
      VOLSYNC_CLAIM: changedetection-config
      VOLSYNC_CAPACITY: 1Gi
      KOPIUR_CLAIM: changedetection-config
      KOPIUR_CAPACITY: 1Gi
      KOPIUR_PUID: "0"
      KOPIUR_PGID: "0"
      KOPIUR_RUNASNONROOT: "false"
  prune: true
  wait: false
  interval: 30m
  timeout: 5m
