---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dashy
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      dashy:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          dashy:
            image:
              repository: ghcr.io/lissy93/dashy
              tag: 4.3.9@sha256:7c79a07e6d204c6522d66d86144eccf8cf9e9366f75fea3551d86c7401c66da3
            env:
              TZ: America/Toronto
              DISABLE_CONFIG_BACKUPS: true
    service:
      dashy:
        ports:
          http:
            port: &mainPort 8080
    route:
      dashy:
        hostnames: ["dashy.zinn.ca"]
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: dashy
                port: *mainPort
    persistence:
      config:
        enabled: true
        existingClaim: "${VOLSYNC_CLAIM}"
        advancedMounts:
          dashy:
            dashy:
              - path: /app/user-data
      icons:
        enabled: true
        type: configMap
        name: dashy-icons
        advancedMounts:
          dashy:
            dashy:
              - path: /app/user-data/item-icons
                readOnly: true
      backup:
        existingClaim: self-hosted-backups
        advancedMounts:
          dashy:
            dashy:
              - path: /backups
                subPath: dashy
