---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dashy
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 2000
        runAsGroup: 2000
        fsGroup: 2000
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            image:
              repository: ghcr.io/lissy93/dashy
              tag: 4.4.0@sha256:a59848117a5a42c226c22ebf173ff8836d4310cd1b2ea0f7dda34fc9ad418360
            env:
              TZ: America/Toronto
              DISABLE_CONFIG_BACKUPS: true
    service:
      main:
        ports:
          http:
            port: &mainPort 8080
    route:
      main:
        hostnames: ["dashy.test.zinn.ca"]
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: main
                port: *mainPort
    persistence:
      config:
        enabled: true
        existingClaim: "${KOPIUR_CLAIM}"
        advancedMounts:
          main:
            main:
              - path: /app/user-data
      icons:
        enabled: true
        type: configMap
        name: dashy-icons
        advancedMounts:
          main:
            main:
              - path: /app/user-data/item-icons
                readOnly: true
