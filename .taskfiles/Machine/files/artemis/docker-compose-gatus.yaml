---
services:
  gatus:
    image: ghcr.io/twin/gatus:v5.18.0@sha256:99b9cde3aac3be093663e5b17c0a884b348aed2c83c7ce954ccaa8eb99d33918
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - 8443:8443
    volumes:
      - /opt/gatus:/config
      - /opt/certificates:/config/certificates
    networks:
      - backend

networks:
  backend: {}
