---
services:
  gatus:
    image: ghcr.io/twin/gatus:v5.36.0@sha256:c5f210d095fa78e6efaa20ffeb14803f2ba4f10615e16a6d12087697149617f0
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - 8443:8443
    volumes:
      - /opt/gatus:/config
      - /opt/certificates:/config/certificates
    networks:
      - backend

networks:
  backend: {}
